# BlastRadius PR impact analysis.
# Copy this file to .github/workflows/blastradius.yml in any Python repo.
# On every pull request it posts (and updates) a comment with the blast
# radius of the change: risk score, affected endpoints, and tests to run.

name: BlastRadius

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # need history to diff against the base branch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install BlastRadius
        run: pip install git+https://github.com/YOUR_USERNAME/blast_radius.git

      - name: Compute blast radius
        id: blast
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          blastradius diff . \
            --base origin/${{ github.base_ref }} --head HEAD \
            --github > impact.md
          echo "generated comment:" && cat impact.md

      - name: Post / update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('impact.md', 'utf8');
            const marker = '### 💥 BlastRadius';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number });
            const mine = comments.find(c => c.body.startsWith(marker));
            if (mine) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: mine.id, body });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body });
            }
